<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MandapBook — no double-booked dates, ever. A KARYA studio build.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9F1239"/>
      <stop offset="1" stop-color="#7A0E2C"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle corner marigold accent -->
  <circle cx="1150" cy="70" r="200" fill="#E8A33D" opacity="0.10"/>
  <circle cx="60" cy="600" r="160" fill="#E8A33D" opacity="0.08"/>

  <!-- left rule -->
  <rect x="90" y="150" width="70" height="6" rx="3" fill="#E8A33D"/>

  <!-- eyebrow -->
  <text x="90" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="3" fill="#F0E3D6">EVENT BOOKING SOFTWARE FOR WEDDING VENDORS</text>

  <!-- product name -->
  <text x="88" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="800" letter-spacing="-3" fill="#FBF7F2">MandapBook</text>

  <!-- tagline -->
  <text x="90" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#FBF7F2">No double-booked dates, <tspan fill="#E8A33D">ever.</tspan></text>

  <!-- sub line -->
  <text x="90" y="480" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="400" fill="#F0E3D6" opacity="0.92">Catch the clash the moment the booking is written.</text>

  <!-- mandap mark, bottom-left near wordmark -->
  <g transform="translate(90 520)">
    <path d="M6 34 L40 12 L74 34 Z" fill="#FBF7F2"/>
    <rect x="12" y="34" width="6" height="46" fill="#FBF7F2"/>
    <rect x="62" y="34" width="6" height="46" fill="#FBF7F2"/>
    <rect x="20" y="70" width="40" height="10" rx="3" fill="#FBF7F2"/>
    <circle cx="40" cy="46" r="11" fill="#E8A33D"/>
    <path d="M40 41 L40 47 M40 50 L40 50.4" stroke="#1C1A17" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- KARYA wordmark bottom-right -->
  <text x="1110" y="575" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="800" letter-spacing="6" fill="#F0E3D6">A KARYA STUDIO BUILD</text>
</svg>
